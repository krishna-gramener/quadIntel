<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Verification Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        h2 { margin-top: 0; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
        .stat { display: inline-block; margin: 10px 20px 10px 0; }
        .stat-label { font-weight: bold; }
    </style>
</head>
<body>
    <h1>Regulatory Risk Correlation System - Data Verification</h1>
    
    <div id="results"></div>
    
    <script src="js/data.js"></script>
    <script src="js/similarity.js"></script>
    
    <script>
        const resultsDiv = document.getElementById('results');
        
        function addSection(title, content, isSuccess = true) {
            const section = document.createElement('div');
            section.className = `section ${isSuccess ? 'success' : 'error'}`;
            section.innerHTML = `<h2>${title}</h2>${content}`;
            resultsDiv.appendChild(section);
        }
        
        // Test 1: Data Loading
        try {
            addSection('✓ Data Loading', `
                <div class="stat"><span class="stat-label">Internal Audits:</span> ${INTERNAL_AUDITS.length}</div>
                <div class="stat"><span class="stat-label">External Documents:</span> ${EXTERNAL_DOCUMENTS.length}</div>
                <div class="stat"><span class="stat-label">Risk Categories:</span> ${ONTOLOGY.risk_categories.length}</div>
                <div class="stat"><span class="stat-label">Themes:</span> ${ONTOLOGY.themes.length}</div>
                <div class="stat"><span class="stat-label">CFR References:</span> ${ONTOLOGY.cfr_references.length}</div>
            `);
        } catch (e) {
            addSection('✗ Data Loading Failed', `<pre>${e.message}</pre>`, false);
        }
        
        // Test 2: Internal Audit Structure
        try {
            const audit = INTERNAL_AUDITS[0];
            const requiredFields = ['id', 'title', 'function', 'overall_rating', 'findings', 'internal_summary', 'external_pattern_alignment', 'discrepancies_vs_enforcement', 'recommendations'];
            const missingFields = requiredFields.filter(field => !audit[field]);
            
            if (missingFields.length === 0) {
                addSection('✓ Internal Audit Structure', `
                    <p>Sample Audit: <strong>${audit.title}</strong></p>
                    <p>All required fields present: ${requiredFields.join(', ')}</p>
                `);
            } else {
                addSection('✗ Internal Audit Structure', `Missing fields: ${missingFields.join(', ')}`, false);
            }
        } catch (e) {
            addSection('✗ Internal Audit Structure Check Failed', `<pre>${e.message}</pre>`, false);
        }
        
        // Test 3: External Document Structure
        try {
            const extDoc = EXTERNAL_DOCUMENTS[0];
            const requiredFields = ['id', 'company', 'date', 'allegations', 'cfr_violations'];
            const missingFields = requiredFields.filter(field => !extDoc[field]);
            
            if (missingFields.length === 0) {
                addSection('✓ External Document Structure', `
                    <p>Sample Document: <strong>${extDoc.company}</strong> (${extDoc.id})</p>
                    <p>All required fields present: ${requiredFields.join(', ')}</p>
                `);
            } else {
                addSection('✗ External Document Structure', `Missing fields: ${missingFields.join(', ')}`, false);
            }
        } catch (e) {
            addSection('✗ External Document Structure Check Failed', `<pre>${e.message}</pre>`, false);
        }
        
        // Test 4: Theme Extraction
        try {
            const internalThemes = extractInternalThemes(INTERNAL_AUDITS[0]);
            const externalThemes = extractExternalThemes(EXTERNAL_DOCUMENTS[0]);
            
            addSection('✓ Theme Extraction', `
                <p><strong>Internal themes from first audit:</strong> ${internalThemes.length} themes</p>
                <pre>${internalThemes.join('\n')}</pre>
                <p><strong>External themes from first document:</strong> ${externalThemes.length} themes</p>
                <pre>${externalThemes.join('\n')}</pre>
            `);
        } catch (e) {
            addSection('✗ Theme Extraction Failed', `<pre>${e.message}</pre>`, false);
        }
        
        // Test 5: Correlation Analysis
        try {
            const analysis = calculateCorrelationAnalysis(INTERNAL_AUDITS[0], EXTERNAL_DOCUMENTS);
            
            addSection('✓ Correlation Analysis', `
                <p><strong>Audit:</strong> ${INTERNAL_AUDITS[0].title}</p>
                <div class="stat"><span class="stat-label">Risk Score:</span> ${analysis.riskScore}/100</div>
                <div class="stat"><span class="stat-label">Alignment:</span> ${analysis.alignmentStrength}</div>
                <div class="stat"><span class="stat-label">Shared Themes:</span> ${analysis.globalOverlap.sharedCount}</div>
                <div class="stat"><span class="stat-label">Internal-Only:</span> ${analysis.globalOverlap.internalOnlyCount}</div>
                <div class="stat"><span class="stat-label">Missing Critical:</span> ${analysis.missingThemes.length}</div>
            `);
        } catch (e) {
            addSection('✗ Correlation Analysis Failed', `<pre>${e.message}</pre>`, false);
        }
        
        // Test 6: All Internal Audits
        try {
            let allValid = true;
            let details = '<ul>';
            
            INTERNAL_AUDITS.forEach((audit, index) => {
                const themes = extractInternalThemes(audit);
                const analysis = calculateCorrelationAnalysis(audit, EXTERNAL_DOCUMENTS);
                details += `<li><strong>${audit.title}</strong> - ${themes.length} themes, Risk: ${analysis.riskScore}, Alignment: ${analysis.alignmentStrength}</li>`;
            });
            
            details += '</ul>';
            
            addSection('✓ All Internal Audits Processed', details);
        } catch (e) {
            addSection('✗ Processing All Audits Failed', `<pre>${e.message}</pre>`, false);
        }
        
        // Test 7: Theme Coverage
        try {
            const allInternalThemes = new Set();
            const allExternalThemes = new Set();
            
            INTERNAL_AUDITS.forEach(audit => {
                extractInternalThemes(audit).forEach(theme => allInternalThemes.add(theme));
            });
            
            EXTERNAL_DOCUMENTS.forEach(doc => {
                extractExternalThemes(doc).forEach(theme => allExternalThemes.add(theme));
            });
            
            const sharedThemes = [...allInternalThemes].filter(t => allExternalThemes.has(t));
            const internalOnly = [...allInternalThemes].filter(t => !allExternalThemes.has(t));
            const externalOnly = [...allExternalThemes].filter(t => !allInternalThemes.has(t));
            
            addSection('✓ Global Theme Coverage', `
                <div class="stat"><span class="stat-label">Total Internal Themes:</span> ${allInternalThemes.size}</div>
                <div class="stat"><span class="stat-label">Total External Themes:</span> ${allExternalThemes.size}</div>
                <div class="stat"><span class="stat-label">Shared Themes:</span> ${sharedThemes.length}</div>
                <div class="stat"><span class="stat-label">Internal-Only:</span> ${internalOnly.length}</div>
                <div class="stat"><span class="stat-label">External-Only:</span> ${externalOnly.length}</div>
                <details>
                    <summary>View Shared Themes</summary>
                    <pre>${sharedThemes.join('\n')}</pre>
                </details>
                <details>
                    <summary>View Internal-Only Themes</summary>
                    <pre>${internalOnly.join('\n')}</pre>
                </details>
                <details>
                    <summary>View External-Only Themes</summary>
                    <pre>${externalOnly.join('\n')}</pre>
                </details>
            `);
        } catch (e) {
            addSection('✗ Theme Coverage Analysis Failed', `<pre>${e.message}</pre>`, false);
        }
        
        // Summary
        const sections = document.querySelectorAll('.section');
        const successCount = document.querySelectorAll('.section.success').length;
        const errorCount = document.querySelectorAll('.section.error').length;
        
        const summary = document.createElement('div');
        summary.className = `section ${errorCount === 0 ? 'success' : 'error'}`;
        summary.innerHTML = `
            <h2>Test Summary</h2>
            <p><strong>Passed:</strong> ${successCount} / ${sections.length}</p>
            <p><strong>Failed:</strong> ${errorCount} / ${sections.length}</p>
            ${errorCount === 0 ? '<p>✓ All tests passed! The system is ready to use.</p>' : '<p>✗ Some tests failed. Please review the errors above.</p>'}
        `;
        resultsDiv.insertBefore(summary, resultsDiv.firstChild);
    </script>
</body>
</html>
